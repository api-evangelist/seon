description: >-
  FinOps view of SEON spend. SEON bills primarily through monthly
  subscriptions: the self-serve Starter plan is a flat monthly fee bundling a
  capped allotment of fraud-check API calls, while Premium is a custom
  enterprise agreement with unlimited calls. The principal cost driver is the
  volume of scoring calls across the Fraud, Email, Phone, IP, and AML APIs,
  each of which counts against the plan allotment or contract.
notes: >-
  Exact per-call overage rates and the Starter allotment are not fully
  published; reconcile against a SEON quote. Subscription model means cost is
  dominated by call volume against the plan cap rather than pure pay-per-call.
