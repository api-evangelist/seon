meters:
- name: fraud_api_calls
  description: Combined transaction fraud-scoring requests counted against the plan allotment.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - api
- name: email_api_calls
  description: Email digital-footprint scoring requests.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - api
- name: phone_api_calls
  description: Phone digital-footprint scoring requests.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - api
- name: ip_api_calls
  description: IP scoring and proxy-detection requests.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - api
- name: aml_api_calls
  description: AML screening requests against sanctions, watchlist, PEP, and adverse-media sources.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - api
- name: monthly_subscription
  description: Flat monthly platform subscription fee (Starter) or custom contract (Premium).
  unit: contracts
  aggregation: sum
  dimensions:
  - account
  - plan
principles:
- name: Visibility
  description: Track fraud-check call volume per API against the plan allotment in the SEON console.
- name: Allocation
  description: Tag API keys per product/team and map module-API usage to internal cost centers.
- name: Optimization
  description: Use module APIs (Email/Phone/IP) selectively instead of full Fraud API scoring where a single signal suffices; right-size the plan to actual monthly call volume.
- name: Accountability
  description: Assign an owner per integration; review monthly call burn against the allotment before overages or upgrade.
