  description: Combined end-to-end fraud scoring endpoint that ingests user, transaction,
    payment, device, email, phone, and IP signals and returns a fraud_score, a state
    decision, and the applied_rules that fired, enriched with email, phone, IP, BIN,
    device, and AML details modules.
