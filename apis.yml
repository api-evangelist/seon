  description: Web, iOS, and Android SDKs capture an encrypted, base64-encoded device
    fingerprint via getSession(); the payload is passed in the Fraud API session field
    and decoded server-side into device_details intelligence covering hardware, browser,
    emulator, and tampering signals.
