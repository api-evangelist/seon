aid: seon
url: https://raw.githubusercontent.com/api-evangelist/seon/refs/heads/main/apis.yml
name: SEON
kind: company
description: SEON provides fraud prevention and anti-money-laundering APIs that combine
  digital-footprint analysis, device fingerprinting, and machine-learning risk scoring.
  The SEON REST API returns real-time fraud scores and enriched intelligence from an
  email address, phone number, or IP address, plus a combined transaction Fraud API
  and AML screening, accessed over HTTPS with an X-API-KEY header.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Fraud Prevention
- Risk Scoring
- Digital Footprint
- AML
- Identity
created: '2026-06-25'
modified: '2026-06-25'
specificationVersion: '0.19'
